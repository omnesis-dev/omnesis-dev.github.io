<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMNESIS</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #d4d4d2;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Inter', -apple-system, sans-serif;
            text-align: center;
        }

        .container {
            max-width: 600px;
            padding: 20px;
        }

        h1 {
            font-size: 3rem;
            letter-spacing: 0.5rem;
            font-weight: 300;
            margin-bottom: 2rem;
            color: #f0f0f0;
        }

        .definitions {
            font-family: 'Georgia', serif;
            font-style: italic;
            font-size: 1.1rem;
            line-height: 1.8;
            opacity: 0.7;
            margin-bottom: 3rem;
        }

        .definition-item {
            margin-bottom: 0.5rem;
        }

        .pitch {
            font-size: 1.2rem;
            letter-spacing: 0.05rem;
            font-weight: 400;
            margin-bottom: 4rem;
            color: #a0a0a0;
        }

        .footer {
            font-size: 0.8rem;
            letter-spacing: 0.2rem;
            text-transform: uppercase;
            opacity: 0.4;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>OMNESIS</h1>

        <div class="definitions">
            <div class="definition-item"><b>omni-</b> &nbsp;/&nbsp; combining form: <i>all; of all things.</i></div>
            <div class="definition-item"><b>-mnesis</b> &nbsp;/&nbsp; suffix: <i>the act of remembering; memory.</i></div>
        </div>

        <div class="pitch">
            Total recall for your digital life.
        </div>

        <div class="footer">
            Coming Soon
        </div>
    </div>

</body>
</html>
