<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMNESIS</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Inter:wght@200;400&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #080808; /* Slightly deeper black */
            color: #c5c5c2;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Inter', sans-serif;
            text-align: center;
        }

        .container {
            max-width: 800px;
            padding: 40px;
        }

        h1 {
            /* This targets the specific flared serif style from your screenshot */
            font-family: 'Cormorant Garamond', serif;
            font-size: 4rem;
            letter-spacing: 0.8rem;
            font-weight: 300;
            margin-bottom: 2.5rem;
            color: #e5e5e5;
            text-transform: uppercase;
        }

        .definitions {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 1.2rem;
            line-height: 2;
            opacity: 0.6;
            margin-bottom: 3.5rem;
        }

        .definition-item b {
            font-style: normal;
            font-weight: 600;
            letter-spacing: 0.1rem;
            color: #d4d4d2;
        }

        .pitch {
            font-size: 1.1rem;
            letter-spacing: 0.08rem;
            font-weight: 300;
            margin-bottom: 5rem;
            color: #888;
        }

        .footer {
            font-size: 0.75rem;
            letter-spacing: 0.3rem;
            text-transform: uppercase;
            opacity: 0.3;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>OMNESIS</h1>

        <div class="definitions">
            <div class="definition-item"><b>omni-</b> &nbsp;/&nbsp; combining form: <i>all; of all things.</i></div>
            <div class="definition-item"><b>-mnesis</b> &nbsp;/&nbsp; suffix: <i>the act of remembering; memory.</i></div>
        </div>

        <div class="pitch">
            Total recall for your digital life.
        </div>

        <div class="footer">
            Coming Soon
        </div>
    </div>

</body>
</html>
